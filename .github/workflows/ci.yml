# costco-saver CI Pipeline
#
# Backend job invokes Makefile targets — Makefile is the single source of
# truth for the gate definition. Adding a guard to `make check` (e.g.
# check-no-google-fonts, future custom guards) automatically gates CI
# without needing to also edit this file. Frontend job stays inline so we
# can express explicit npm cache config (cache-dependency-path).
#
# Runs on every PR targeting main and on push to main.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Auto-cancel any in-progress run for the same ref (branch or PR) when a new
# event arrives. Prevents queue pile-up from rapid pushes; PR runs and the
# eventual push-to-main run live in different groups so they do not cancel
# each other.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      # Postgres service container. The job runs directly on the runner VM
      # (no container:), so the service port is published to the host and
      # reached via localhost — the service name is not DNS-resolvable here.
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: backend
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      # Fail if a model change has no migration — with multiple contributors this
      # catches a forgotten migration before it breaks main. (Divergent migration
      # leaves are additionally caught by `make test`, which runs migrate.)
      - name: Check for missing migrations
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: ci-test-secret-key
          JWT_SIGNING_KEY: ci-test-jwt-key
          DEBUG: "True"
        run: .venv/bin/python manage.py makemigrations --check --dry-run

      # All gate steps below invoke Makefile targets so the gate definition
      # stays in the Makefile, not split across CI and local. Add guards
      # to `make check` and they auto-gate CI without editing this file.
      - name: Verify no third-party Google Fonts CDN references
        run: make check-no-google-fonts

      - name: Run tests with coverage
        env:
          # Service port is published to the runner host, so reach it via localhost.
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: ci-test-secret-key
          JWT_SIGNING_KEY: ci-test-jwt-key
          # DEBUG default is now False (fail-secure); tests run with it on so the
          # prod-only SECURE_SSL_REDIRECT doesn't 301 the http test client.
          DEBUG: "True"
        run: make test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run build
        timeout-minutes: 10

  # Secret-leak gate on the PR diff. Pattern list comes from the
  # GREP_GATE_PATTERNS Actions secret (never hardcoded in this public repo).
  grep-gate:
    name: grep-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan PR diff for forbidden patterns
        env:
          GREP_GATE_PATTERNS: ${{ secrets.GREP_GATE_PATTERNS }}
        run: |
          if [ -z "${GREP_GATE_PATTERNS:-}" ]; then
            echo "::error::GREP_GATE_PATTERNS secret is not set"; exit 1
          fi
          git fetch --no-tags origin "${{ github.event.pull_request.base.sha }}" || true
          base="${{ github.event.pull_request.base.sha }}"
          hits="$(git diff "$base" HEAD | grep -E '^\+' | grep -iE "$GREP_GATE_PATTERNS" || true)"
          if [ -n "$hits" ]; then
            echo "::error::grep-gate found forbidden pattern(s) in added lines"
            echo "$hits"
            exit 1
          fi
          echo "grep-gate clean"
